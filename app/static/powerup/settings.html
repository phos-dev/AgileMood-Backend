<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Configurar AgileMood</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           font-size: 14px; background: linear-gradient(135deg, #eff6ff 0%, #fff 100%);
           min-height: 100vh; padding: 12px;
           display: flex; align-items: center; justify-content: center;
           color-scheme: light; }
    .logo { font-size: 32px; text-align: center; margin-bottom: 4px; }
    .title { font-size: 16px; font-weight: 700; color: #1f2937;
             text-align: center; margin: 0 0 4px; }
    .subtitle { font-size: 12px; color: #6b7280; text-align: center; margin: 0 0 20px; }
    .field { margin-bottom: 4px; }
    .field label { display: block; font-size: 12px; font-weight: 500;
                   color: #374151; margin-bottom: 4px; }
    .field input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db;
                   border-radius: 6px; font-size: 13px; color: #1f2937; outline: none; }
    .field input:focus { border-color: #1d4ed8; box-shadow: 0 0 0 2px rgba(29,78,216,0.15); }
    .field-info { font-size: 11px; color: #9ca3af; margin: 3px 0 10px; }
    .card { background: white; border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 20px; width: 100%; }
    .btn { width: 100%; padding: 9px 12px; border-radius: 6px; font-size: 13px;
           font-weight: 600; cursor: pointer; border: none; margin-top: 8px; }
    .btn-primary { background: #1d4ed8; color: white; }
    .btn-primary:hover { background: #1e40af; }
    .success { font-size: 12px; color: #16a34a; text-align: center; margin-top: 8px; }
    .error { font-size: 12px; color: #ef4444; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎯</div>
    <p class="title">Configurar AgileMood</p>
    <p class="subtitle">Configure o Power-Up para sua equipe</p>

    <div class="field">
      <label>ID da Equipe</label>
      <input type="number" id="teamId" placeholder="1" />
      <p class="field-info">Cada membro fará login com sua própria conta ao abrir os widgets.</p>
    </div>

    <button class="btn btn-primary" id="saveBtn">Salvar</button>
    <div id="status"></div>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();

    t.get("board", "private", "settings").then(function(saved) {
      if (saved && saved.teamId) {
        document.getElementById("teamId").value = saved.teamId;
      }
    });

    document.getElementById("saveBtn").addEventListener("click", function() {
      var teamId = document.getElementById("teamId").value.trim();
      var statusEl = document.getElementById("status");

      if (!teamId) {
        statusEl.className = "error";
        statusEl.textContent = "Informe o ID da Equipe.";
        return;
      }

      t.set("board", "private", "settings", { teamId: parseInt(teamId) })
        .then(function() {
          statusEl.className = "success";
          statusEl.textContent = "✓ Configuração salva!";
        })
        .catch(function() {
          statusEl.className = "error";
          statusEl.textContent = "Erro ao salvar. Tente novamente.";
        });
    });
  </script>
</body>
</html>
