modules:
  jira:projectPage:
    - key: agilemood-dashboard
      title: Dashboard AgileMood
      function: dashboard-fn
      render: native

  jira:issuePanel:
    - key: agilemood-register-feeling
      title: Registar Sentimento
      function: register-feeling-fn
      render: native
      icon: https://agilemood-backend-v2.vercel.app/powerup/icon.png
    - key: agilemood-messages
      title: Mensagens Recebidas
      function: messages-fn
      render: native
      icon: https://agilemood-backend-v2.vercel.app/powerup/icon.png

  jira:adminPage:
    - key: agilemood-settings
      title: AgileMood Settings
      function: settings-fn
      render: native

  trigger:
    - key: agilemood-sprint-end
      function: sprint-end-fn
      events:
        - avi:jira:updated:sprint

  function:
    - key: dashboard-fn
      handler: index.runDashboard
    - key: register-feeling-fn
      handler: index.runRegisterFeeling
    - key: messages-fn
      handler: index.runMessages
    - key: settings-fn
      handler: index.runSettings
    - key: sprint-end-fn
      handler: trigger.handler

permissions:
  scopes:
    - storage:app
    - read:jira-user
    - read:jira-work
  external:
    fetch:
      backend:
        - address: "*"

app:
  id: ari:cloud:ecosystem::app/47a7abed-39a8-4f7b-8240-e1152b99e308
  runtime:
    name: nodejs22.x
