modules:
  jira:projectPage:
    - key: agilemood-dashboard
      title: AgileMood
      resource: dashboard-res
      render: native
      resolver:
        function: resolver-fn

  jira:adminPage:
    - key: agilemood-settings
      title: AgileMood Settings
      resource: settings-res
      render: native
      resolver:
        function: resolver-fn

  trigger:
    - key: agilemood-sprint-end
      function: sprint-end-fn
      events:
        - avi:jira-software:closed:sprint

  function:
    - key: resolver-fn
      handler: resolver.handler
    - key: sprint-end-fn
      handler: trigger.handler

resources:
  - key: dashboard-res
    path: src/dashboard.tsx
  - key: settings-res
    path: src/settings.tsx

permissions:
  scopes:
    - storage:app
    - read:jira-user
    - read:jira-work
    - read:sprint:jira-software
    - read:board-scope:jira-software
    - read:project:jira
  external:
    fetch:
      backend:
        - address: "*"

app:
  id: ari:cloud:ecosystem::app/47a7abed-39a8-4f7b-8240-e1152b99e308
  runtime:
    name: nodejs22.x
